name: kid_learn
description: "小學堂 Kid Learn - 結合學校課程的兒童學習 App (iOS / Android)"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  flutter_tts: ^4.0.2
  confetti: ^0.7.0
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  http: ^1.2.2
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
